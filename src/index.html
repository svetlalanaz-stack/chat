<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
</head>
<body>
    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Участники</h3>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
        <div class="main">
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
                <button id="sendBtn" disabled>Отправить</button>
            </div>
        </div>
    </div>
    <div class="modal" id="nicknameModal">
        <div class="modal-content">
            <h2>Вход в чат</h2>
            <input type="text" id="nicknameInput" placeholder="Введите никнейм">
            <button id="joinBtn">Войти</button>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>
</body>
</html>
